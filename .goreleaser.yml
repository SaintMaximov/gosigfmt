version: 2

project_name: gosigfmt

builds:
  - id: gosigfmt
    main: ./cmd/gosigfmt
    binary: gosigfmt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

dockers:
  - image_templates:
      - "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}-amd64"
      - "saintmaximov/gosigfmt:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
    extra_files:
      - go.mod
      - go.sum
      - cmd
      - internal
  - image_templates:
      - "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}-arm64"
      - "saintmaximov/gosigfmt:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
    extra_files:
      - go.mod
      - go.sum
      - cmd
      - internal

docker_manifests:
  - name_template: "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}"
    image_templates:
      - "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}-amd64"
      - "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}-arm64"
  - name_template: "ghcr.io/saintmaximov/gosigfmt:latest"
    image_templates:
      - "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}-amd64"
      - "ghcr.io/saintmaximov/gosigfmt:{{ .Version }}-arm64"
  - name_template: "saintmaximov/gosigfmt:{{ .Version }}"
    image_templates:
      - "saintmaximov/gosigfmt:{{ .Version }}-amd64"
      - "saintmaximov/gosigfmt:{{ .Version }}-arm64"
  - name_template: "saintmaximov/gosigfmt:latest"
    image_templates:
      - "saintmaximov/gosigfmt:{{ .Version }}-amd64"
      - "saintmaximov/gosigfmt:{{ .Version }}-arm64"

release:
  github:
    owner: SaintMaximov
    name: gosigfmt
