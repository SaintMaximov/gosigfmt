name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: go test -fuzz=FuzzFormat -fuzztime=60s ./internal/format
      - name: Dogfood
        run: |
          go build -o /tmp/gosigfmt ./cmd/gosigfmt
          /tmp/gosigfmt -l ./...
